<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width,
           initial-scale=1.0,
           user-scalable=no">

<title>オンライン鬼ごっこ</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  background: #222;
  touch-action: none;
  font-family: sans-serif;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  background: #7bc96f;
}

/* ---------- 上部UI ---------- */

#ui {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: white;
  z-index: 100;
  pointer-events: none;
  width: 95%;
}

#myName {
  font-size: 22px;
  font-weight: bold;
}

#oniText {
  font-size: 24px;
  color: yellow;
  margin-top: 4px;
}

#countdown {
  font-size: 60px;
  font-weight: bold;
  margin-top: 5px;
}

#timer {
  font-size: 28px;
  margin-top: 5px;
}

#message {
  font-size: 36px;
  color: orange;
  font-weight: bold;
  margin-top: 10px;
}

/* ---------- ミニマップ ---------- */

#miniMap {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 160px;
  height: 100px;
  border: 2px solid white;
  background: rgba(0,0,0,0.35);
  z-index: 100;
}

/* ---------- スマホ操作 ---------- */

#controls {
  position: fixed;
  left: 15px;
  bottom: 15px;
  z-index: 100;
  user-select: none;
}

#top {
  text-align: center;
}

#controls button {
  width: 50px;
  height: 50px;
  margin: 3px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.8);
  font-size: 24px;
}

/* ---------- リスタート ---------- */

#restart {
  position: fixed;
  right: 15px;
  bottom: 15px;
  width: 90px;
  height: 40px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  background: rgba(255,255,255,0.85);
  z-index: 100;
}

/* PCではスマホボタンを非表示 */

@media (min-width: 900px) {
  #controls {
    display: none;
  }
}
</style>

</head>
<body>

<div id="ui">

  <div id="myName">
    接続中...
  </div>

  <div id="oniText">
  </div>

  <div id="countdown">
  </div>

  <div id="timer">
    残り60秒
  </div>

  <div id="message">
  </div>

</div>

<canvas id="miniMap"></canvas>
<canvas id="game"></canvas>

<div id="controls">

  <div id="top">
    <button id="up">↑</button>
  </div>

  <div>
    <button id="left">←</button>
    <button id="down">↓</button>
    <button id="right">→</button>
  </div>

</div>

<button id="restart">
  再開
</button>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
