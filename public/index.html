<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width,
           initial-scale=1.0,
           user-scalable=no">

<title>オンライン鬼ごっこ</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #222;
  touch-action: none;
  font-family: sans-serif;
}

canvas {
  display: block;
  background: #7bc96f;
}

/* 上部UI */

#ui {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: white;
  z-index: 100;
  pointer-events: none;
}

#myName {
  font-size: 24px;
  font-weight: bold;
}

#oniText {
  font-size: 26px;
  color: yellow;
  margin-top: 5px;
}

#countdown {
  font-size: 60px;
  font-weight: bold;
  margin-top: 5px;
}

#timer {
  font-size: 30px;
  margin-top: 5px;
}

#message {
  font-size: 38px;
  color: orange;
  font-weight: bold;
  margin-top: 10px;
}

/* スマホボタン */

#controls {
  position: fixed;
  left: 15px;
  bottom: 15px;
  z-index: 100;
  user-select: none;
}

#top {
  text-align: center;
}

#controls button {
  width: 50px;
  height: 50px;
  margin: 3px;
  font-size: 24px;
  border: none;
  border-radius: 15px;
  background: rgba(255,255,255,0.75);
}

/* リスタート */

#restart {
  position: fixed;
  right: 15px;
  top: 15px;
  width: 90px;
  height: 40px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  background: rgba(255,255,255,0.8);
  z-index: 100;
}

/* PCではボタンを非表示 */

@media (min-width: 900px) {
  #controls {
    display: none;
  }
}
</style>

</head>
<body>

<div id="ui">

  <div id="myName">
    接続中...
  </div>

  <div id="oniText">
  </div>

  <div id="countdown">
  </div>

  <div id="timer">
    残り60秒
  </div>

  <div id="message">
  </div>

</div>

<canvas id="game"></canvas>

<div id="controls">

  <div id="top">
    <button id="up">↑</button>
  </div>

  <div>
    <button id="left">←</button>
    <button id="down">↓</button>
    <button id="right">→</button>
  </div>

</div>

<button id="restart">
  再開
</button>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
